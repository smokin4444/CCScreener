name: Daily Income Scan

on:
  schedule:
    # 23:00 UTC is 10:00 AM Melbourne time (AEDT)
    # This runs Monday-Friday
    - cron: '0 23 * * 0-4' 
  workflow_dispatch: # This allows you to click "Run workflow" manually

jobs:
  build:
    runs-on: ubuntu-latest
    
    # This gives the bot permission to update your files
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas pandas_ta tabulate

      - name: Run Income Screener
        run: python screener.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          # Only commit if there are actually changes to avoid errors
          git diff --staged --quiet || git commit -m "Auto-update: Fresh Yield Data $(date +'%Y-%m-%d')"
          git push
