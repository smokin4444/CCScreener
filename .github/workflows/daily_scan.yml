name: Daily Income Scan
on:
  schedule:
    - cron: '0 23 * * 0-4' 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Updated for better library support
      - name: Install Deps
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas tabulate
          pip install pandas-ta # Standard naming for the technical analysis lib
      - name: Run Scan
        run: python screener.py
      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          git diff --staged --quiet || (git commit -m "Update Yields" && git push)
