name: Daily Income Scan
on:
  schedule:
    - cron: '0 23 * * 0-4' 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches full history for stable git push
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Deps
        run: |
          pip install yfinance pandas pandas-ta tabulate
      - name: Run Scan
        run: python screener.py
      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          git diff --staged --quiet || (git commit -m "Update Yields" && git push)
